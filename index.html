<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>방콕 여행 플래너</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; display:flex; height:100vh; background:#f0f2f5; }
  #map { flex:1; min-width:0; }
  #sidebar { width:440px; display:flex; flex-direction:column; background:#fff; border-left:1px solid #ddd; overflow:hidden; }
  .sidebar-header { padding:12px 16px; border-bottom:1px solid #eee; }
  .sidebar-header h2 { font-size:16px; color:#222; }
  .sidebar-header p { font-size:11px; color:#999; margin-top:2px; }

  /* Pool */
  #pool-area { border-bottom:2px solid #e0e0e0; background:#f5f6f8; flex-shrink:0; transition:max-height .3s; overflow:hidden; }
  #pool-area.collapsed { max-height:36px!important; }
  .pool-header { padding:8px 14px; font-size:11px; font-weight:700; color:#888; display:flex; justify-content:space-between; align-items:center; cursor:pointer; user-select:none; position:sticky; top:0; background:#f5f6f8; z-index:1; }
  .pool-header:hover { background:#eee; }
  .pool-header .cnt { background:#ccc; color:#555; padding:1px 7px; border-radius:10px; font-size:10px; margin-left:4px; }
  .pool-header .toggle-icon { font-size:10px; color:#4a9eda; }
  #pool-scroll { max-height:220px; overflow-y:auto; padding:0 6px 6px; }

  /* Day Tabs */
  .day-tabs { display:flex; border-bottom:1px solid #eee; background:#fafafa; flex-shrink:0; }
  .day-tab { flex:1; padding:9px 4px; text-align:center; cursor:pointer; font-size:12px; font-weight:600; color:#888; border-bottom:3px solid transparent; transition:all .15s; }
  .day-tab:hover { color:#555; background:#f0f0f0; }
  .day-tab.active { color:#4a9eda; border-bottom-color:#4a9eda; background:#fff; }
  .day-tab .dd { font-size:10px; font-weight:400; color:#aaa; display:block; }
  .day-tab.active .dd { color:#7ab8e8; }

  /* Day area */
  #day-area { flex:1; overflow-y:auto; padding:8px; }
  .day-label { font-size:11px; font-weight:700; color:#4a9eda; padding:4px 8px 6px; display:flex; align-items:center; gap:6px; }
  .hotel-badge { font-size:10px; background:#fff3e0; color:#e67e22; padding:2px 8px; border-radius:4px; font-weight:600; }

  /* Drop zone */
  .drop-zone { min-height:50px; border:2px dashed #ddd; border-radius:10px; padding:6px; transition:all .2s; background:#fafbfc; }
  .drop-zone.drag-over { border-color:#4a9eda; background:#e8f4fd; }
  .drop-zone.empty::after { content:'\\2191 위에서 장소를 드래그하세요'; display:block; text-align:center; color:#bbb; font-size:12px; padding:14px 0; }
  #drop-pool.empty::after { content:'모든 장소 배정 완료'; }

  /* Cards */
  .spot-card-wrapper { position:relative; margin-bottom:5px; }
  .spot-card { display:flex; gap:10px; padding:8px; border-radius:10px; cursor:grab; transition:all .15s; border:1px solid #eee; background:#fff; user-select:none; }
  .spot-card:active { cursor:grabbing; }
  .spot-card:hover { border-color:#ccc; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .spot-card.highlight { border-color:#4a9eda; background:#f0f8ff; }

  .spot-img-wrap { position:relative; flex-shrink:0; cursor:pointer; }
  .spot-img { width:68px; height:50px; border-radius:6px; object-fit:cover; background:#eee; display:block; }
  .spot-img-placeholder { width:68px; height:50px; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:16px; }
  .img-zoom { position:absolute; bottom:2px; right:2px; background:rgba(0,0,0,.5); color:#fff; width:18px; height:18px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:11px; opacity:0; transition:opacity .2s; pointer-events:none; }
  .spot-img-wrap:hover .img-zoom { opacity:1; }

  .spot-info { flex:1; min-width:0; }
  .spot-name { font-weight:600; font-size:13px; color:#222; display:flex; align-items:center; gap:5px; }
  .must-badge { font-size:9px; background:#e74c3c; color:#fff; padding:1px 5px; border-radius:3px; font-weight:700; letter-spacing:.5px; flex-shrink:0; }
  .spot-desc { font-size:11px; color:#777; margin-top:1px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .spot-tags { margin-top:2px; }
  .spot-tags span { display:inline-block; font-size:9px; padding:1px 5px; border-radius:3px; background:#f0f0f0; color:#666; margin-right:3px; }

  .spot-num { position:absolute; top:-3px; left:-3px; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:10px; color:#fff; z-index:2; border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.2); }

  /* Map markers */
  .numbered-marker { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#fff; border:3px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.3); }
  .hotel-marker { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; border:3px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.3); background:#fff; }

  /* Lightbox */
  #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:9999; align-items:center; justify-content:center; flex-direction:column; cursor:pointer; }
  #lightbox.show { display:flex; }
  #lightbox img { max-width:85vw; max-height:75vh; border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,.5); }
  #lightbox .lb-title { color:#fff; font-size:18px; font-weight:600; margin-top:16px; }
  #lightbox .lb-close { position:absolute; top:20px; right:28px; color:#fff; font-size:32px; cursor:pointer; opacity:.7; }
  #lightbox .lb-close:hover { opacity:1; }

  .legend-bar { display:flex; gap:10px; padding:7px 14px; border-top:1px solid #eee; background:#fafafa; font-size:10px; color:#888; flex-wrap:wrap; flex-shrink:0; }
  .legend-bar .li { display:flex; align-items:center; gap:4px; }
  .legend-bar .ld { width:9px; height:9px; border-radius:50%; }
  .insert-line { height:3px; background:#4a9eda; border-radius:2px; margin:2px 0; }
  .transit-tip { font-size:11px!important; font-weight:600; padding:2px 6px!important; }
  #transit-btn { position:absolute; top:10px; right:10px; z-index:1000; background:#fff; border:1px solid #ccc; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.15); }
  #transit-btn:hover { background:#f0f0f0; }
</style>
</head>
<body>

<div id="map">
  <button id="transit-btn" onclick="toggleTransit()">🚇 노선 숨기기</button>
</div>

<div id="sidebar">
  <div class="sidebar-header">
    <h2>방콕 여행 플래너</h2>
    <p>후보지 → Day로 드래그 · 사진 클릭 시 확대 · Day 탭 클릭 시 경로</p>
  </div>

  <div id="pool-area">
    <div class="pool-header" onclick="togglePool()">
      <span>미배정 후보지 <span class="cnt" id="pool-count">0</span></span>
      <span class="toggle-icon" id="pool-arrow">▲ 접기</span>
    </div>
    <div id="pool-scroll">
      <div class="drop-zone" id="drop-pool"></div>
    </div>
  </div>

  <div class="day-tabs">
    <div class="day-tab active" data-day="1" onclick="switchTab('1')"><span>Day 1</span><span class="dd">3/25 수</span></div>
    <div class="day-tab" data-day="2" onclick="switchTab('2')"><span>Day 2</span><span class="dd">3/26 목</span></div>
    <div class="day-tab" data-day="3" onclick="switchTab('3')"><span>Day 3</span><span class="dd">3/27 금</span></div>
    <div class="day-tab" data-day="4" onclick="switchTab('4')"><span>Day 4</span><span class="dd">3/28 토</span></div>
  </div>

  <div id="day-area">
    <div id="day-panel-1" class="day-panel">
      <div class="day-label">Day 1 일정 <span class="hotel-badge">🏨 센터포인트 실롬</span></div>
      <div class="drop-zone" id="drop-1"></div>
    </div>
    <div id="day-panel-2" class="day-panel" style="display:none;">
      <div class="day-label">Day 2 일정 <span class="hotel-badge">🏨 실롬→룸피니</span></div>
      <div class="drop-zone" id="drop-2"></div>
    </div>
    <div id="day-panel-3" class="day-panel" style="display:none;">
      <div class="day-label">Day 3 일정 <span class="hotel-badge">🏨 룸피니공원</span></div>
      <div class="drop-zone" id="drop-3"></div>
    </div>
    <div id="day-panel-4" class="day-panel" style="display:none;">
      <div class="day-label">Day 4 일정 <span class="hotel-badge">🏨 룸피니→공항</span></div>
      <div class="drop-zone" id="drop-4"></div>
    </div>
  </div>

  <div class="legend-bar" style="justify-content:space-between;">
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <div class="li"><div class="ld" style="background:#e74c3c;"></div>왕궁 근처</div>
      <div class="li"><div class="ld" style="background:#3498db;"></div>시내 이동</div>
      <div class="li"><div class="ld" style="background:#27ae60;"></div>반나절투어</div>
      <div class="li"><div class="ld" style="background:#8e44ad;"></div>야시장/야간</div>
      <div class="li"><div class="ld" style="background:#f39c12;"></div>숙소/왕궁</div>
      <div class="li"><span class="must-badge">MUST</span> 필수</div>
      <div class="li"><div class="ld" style="background:#7dc242;"></div>BTS</div>
      <div class="li"><div class="ld" style="background:#1e3a8a;"></div>MRT</div>
    </div>
    <button id="share-btn" onclick="shareURL()" style="background:#4a9eda;color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;">🔗 일정 URL 복사</button>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <span class="lb-close">&times;</span>
  <img id="lb-img" src="" alt="" referrerpolicy="no-referrer" crossorigin="anonymous">
  <div class="lb-title" id="lb-title"></div>
</div>

// ─── Routes ───
function clearRoutes(){ routeLines.forEach(l=>map.removeLayer(l)); routeLines=[]; }

function drawRoute(day){
  clearRoutes();
  const zone=document.getElementById('drop-'+day);
  if(!zone) return;
  const ids=[...zone.querySelectorAll('.spot-card-wrapper')].map(c=>parseInt(c.dataset.id));
  if(ids.length<1) return;
  const color=dayColors[day]||"#4a9eda";
  const pts=[];
  const h=dayHotels[day];
  if(h) pts.push([h.lat,h.lng]);
  ids.forEach(id=>{ const s=spots.find(x=>x.id===id); if(s) pts.push([s.lat,s.lng]); });
  if(h) pts.push([h.lat,h.lng]);
  if(pts.length<2) return;
  // 외곽선 (두꺼운 테두리)
  routeLines.push(L.polyline(pts,{color:'#000',weight:9,opacity:.2,lineCap:'round',lineJoin:'round'}).addTo(map));
  // 메인 라인
  routeLines.push(L.polyline(pts,{color,weight:6,opacity:.9,lineCap:'round',lineJoin:'round'}).addTo(map));
  // 화살표 (중간중간 방향 표시)
  for(let i=0;i<pts.length-1;i++){
    const [y1,x1]=pts[i],[y2,x2]=pts[i+1];
    const mx=(y1+y2)/2, my=(x1+x2)/2;
    const ang=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
    const aic=L.divIcon({className:'',html:`<div style="font-size:16px;color:${color};transform:rotate(${90-ang}deg);text-shadow:0 0 3px #fff,0 0 3px #fff;">▼</div>`,iconSize:[16,16],iconAnchor:[8,8]});
    routeLines.push(L.marker([mx,my],{icon:aic,interactive:false}).addTo(map));
  }
  pts.forEach((p,i)=>{
    routeLines.push(L.circleMarker(p,{radius:8,fillColor:color,color:'#fff',weight:3,fillOpacity:1}).addTo(map));
    if(i>0&&i<pts.length-1){
      const oi=L.divIcon({className:'',html:`<div style="background:${color};color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);">${i}</div>`,iconSize:[24,24],iconAnchor:[12,34]});
      routeLines.push(L.marker(p,{icon:oi,interactive:false}).addTo(map));
    }
  });
  map.fitBounds(L.latLngBounds(pts).pad(.12),{duration:.5});
}

// ─── Card ───
function createCard(s){
  const w=document.createElement('div');
  w.className='spot-card-wrapper'; w.dataset.id=s.id; w.draggable=true;

  const imgHtml = s.img
    ? `<div class="spot-img-wrap" draggable="false" data-sid="${s.id}"><img class="spot-img" draggable="false" src="${s.img}" alt="${s.name}" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<div class=\\'spot-img-placeholder\\' style=\\'background:${s.color}\\'>${s.id}</div>'"><div class="img-zoom">🔍</div></div>`
    : `<div class="spot-img-wrap"><div class="spot-img-placeholder" style="background:${s.color}">${s.id}</div></div>`;

  const mustHtml = s.must ? '<span class="must-badge">MUST</span>' : '';

  w.innerHTML = `
    <div class="spot-num" style="background:${s.color};">${s.id}</div>
    <div class="spot-card" data-id="${s.id}">
      ${imgHtml}
      <div class="spot-info">
        <div class="spot-name">${s.name} ${mustHtml}</div>
        <div class="spot-desc">${s.desc}</div>
        <div class="spot-tags">${s.tags.map(t=>`<span>${t}</span>`).join('')}</div>
      </div>
    </div>
  `;

  // Image click -> lightbox (pointerup to bypass drag interference)
  const imgWrap = w.querySelector('.spot-img-wrap');
  if(imgWrap && s.img){
    let psx=0,psy=0;
    imgWrap.addEventListener('pointerdown',(e)=>{psx=e.clientX;psy=e.clientY;});
    imgWrap.addEventListener('pointerup',(e)=>{
      if(Math.abs(e.clientX-psx)<5&&Math.abs(e.clientY-psy)<5){
        e.stopPropagation(); e.preventDefault(); openLightbox(s);
      }
    });
    imgWrap.addEventListener('click',(e)=>{e.stopPropagation();e.preventDefault();});
  }

  // Card click -> fly to
  w.querySelector('.spot-card').addEventListener('click', ()=>{
    map.flyTo([s.lat,s.lng],15,{duration:.6});
    markers[s.id].openPopup();
    document.querySelectorAll('.spot-card').forEach(c=>c.classList.remove('highlight'));
    w.querySelector('.spot-card').classList.add('highlight');
  });

  w.addEventListener('dragstart', e=>{
    if(e.target.closest&&e.target.closest('.spot-img-wrap')){e.preventDefault();return;}
    e.dataTransfer.setData('text/plain',String(s.id));
    e.dataTransfer.effectAllowed='move';
    requestAnimationFrame(()=>w.classList.add('dragging'));
  });
  w.addEventListener('dragend', ()=>w.classList.remove('dragging'));
  return w;
}

// ─── Drop zones ───
function setupDZ(zoneId,day){
  const z=document.getElementById(zoneId);
  z.addEventListener('dragover',e=>{
    e.preventDefault(); e.dataTransfer.dropEffect='move'; z.classList.add('drag-over');
    const cards=[...z.querySelectorAll('.spot-card-wrapper:not(.dragging)')];
    z.querySelectorAll('.insert-line').forEach(l=>l.remove());
    let before=null;
    for(const c of cards){ const r=c.getBoundingClientRect(); if(e.clientY<r.top+r.height/2){before=c;break;} }
    const line=document.createElement('div'); line.className='insert-line';
    if(before) z.insertBefore(line,before); else z.appendChild(line);
  });
  z.addEventListener('dragleave',e=>{
    if(!z.contains(e.relatedTarget)){z.classList.remove('drag-over');z.querySelectorAll('.insert-line').forEach(l=>l.remove());}
  });
  z.addEventListener('drop',e=>{
    e.preventDefault(); z.classList.remove('drag-over');
    const sid=parseInt(e.dataTransfer.getData('text/plain'));
    const s=spots.find(x=>x.id===sid); if(!s) return;
    const il=z.querySelector('.insert-line'); const ns=il?il.nextElementSibling:null;
    z.querySelectorAll('.insert-line').forEach(l=>l.remove());
    document.querySelectorAll(`.spot-card-wrapper[data-id="${sid}"]`).forEach(el=>el.remove());
    const nc=createCard(s);
    if(ns&&z.contains(ns)) z.insertBefore(nc,ns); else z.appendChild(nc);
    assignment[sid]=day;
    saveState();
    updateUI();
    if(currentTab!=='pool') drawRoute(currentTab);
  });
}
['pool','1','2','3','4'].forEach(d=>setupDZ('drop-'+d,d));

// ─── URL Share ───
function encodeState(){
  // Format: p=1.3.5&d1=4.7.1.2&d2=...  (dots instead of commas for clean URLs)
  const parts=[];
  ['pool','1','2','3','4'].forEach(day=>{
    const z=document.getElementById('drop-'+day);
    if(z){
      const ids=[...z.querySelectorAll('.spot-card-wrapper')].map(c=>c.dataset.id);
      const key = day==='pool'?'p':'d'+day;
      if(ids.length) parts.push(key+'='+ids.join('.'));
    }
  });
  return parts.join('&');
}

function decodeState(){
  const raw=window.location.hash.slice(1);
  if(!raw) return false;
  const keyMap={p:'pool',d1:'1',d2:'2',d3:'3',d4:'4'};
  spots.forEach(s=>assignment[s.id]='pool');
  let found=false;
  raw.split('&').forEach(part=>{
    const [key,val]=part.split('=');
    const day=keyMap[key];
    if(day && val){
      found=true;
      const ids=val.split('.').map(Number).filter(n=>!isNaN(n));
      ids.forEach(id=>{ if(assignment.hasOwnProperty(id)) assignment[id]=day; });
      dayOrder[day]=ids;
    }
  });
  return found;
}

function shareURL(){
  const hash=encodeState();
  const base=window.location.origin+window.location.pathname;
  const fullURL=base+'#'+hash;
  window.location.hash=hash;
  navigator.clipboard.writeText(fullURL).then(()=>{
    const btn=document.getElementById('share-btn');
    btn.textContent='✅ 복사완료!';
    setTimeout(()=>{btn.textContent='🔗 일정 URL 복사';},2000);
  }).catch(()=>{
    prompt('이 URL을 복사하세요:', fullURL);
  });
}

// ─── Init ───
function init(){
  // URL hash가 있으면 그걸로 복원, 없으면 localStorage
  const fromURL = decodeState();

  ['pool','1','2','3','4'].forEach(day=>{
    const z=document.getElementById('drop-'+day); z.innerHTML='';
    const allIds=Object.entries(assignment).filter(([_,d])=>d===day).map(([id])=>parseInt(id));
    const savedOrder = dayOrder[day] || [];
    const ordered = savedOrder.filter(id => allIds.includes(id));
    const remaining = allIds.filter(id => !ordered.includes(id)).sort((a,b)=>a-b);
    const ids = [...ordered, ...remaining];
    ids.forEach(id=>{ const s=spots.find(x=>x.id===id); if(s) z.appendChild(createCard(s)); });
  });
  updateUI();
  if(!fromURL) saveState(); // URL에서 불러왔으면 localStorage도 갱신
  switchTab('1');
  const all=[...spots.map(s=>[s.lat,s.lng]),...hotels.map(h=>[h.lat,h.lng]),[gp.lat,gp.lng]];
  map.fitBounds(all,{padding:[30,30]});
}
init();
</script>
